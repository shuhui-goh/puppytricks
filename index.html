<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Puppy Tricks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFFFFF;
      --text-dark: #1A1A1A;
      --text-mid: #6B6B6B;
      --coral: #E8715A;
      --coral-dark: #BE4737;
      --yellow-dark: #C49A1A;
      --blue-dark: #3D85A8;
    }

    html, body {
      width: 100%; height: 100%;
      background: url('assets/background.svg') center center / cover no-repeat fixed;
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', sans-serif;
      color: var(--text-dark);
      overflow: hidden;
    }

    /* ─── MAIN SCREEN ─── */
    #main-screen {
      display: none;
      width: 100%; height: 100%;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 20px;
    }
    #main-screen.visible { display: flex; }

    /* ─── GESTURE PANEL ─── */
    #legend {
      position: fixed;
      top: 50%;
      left: 24px;
      transform: translateY(-50%);
      width: 220px;
      background: rgba(30, 50, 20, 0.45);
      backdrop-filter: blur(40px) saturate(140%);
      -webkit-backdrop-filter: blur(40px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 8px 32px rgba(0,0,0,0.2);
      border-radius: 20px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
      z-index: 20;
    }
    #legend h3 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.3px;
      text-transform: none;
      color: rgba(255,255,255,0.95);
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .gesture-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 8px 10px 16px;
      border-radius: 0;
      border-top: 1px solid rgba(255,255,255,0.12);
      transition: background 0.18s;
    }
    .gesture-item:first-of-type { border-top: none; }
    .gesture-item.active { background: rgba(255,255,255,0.15); border-radius: 10px; border-top-color: transparent; }
    .gesture-item.active + .gesture-item { border-top-color: transparent; }
    .gesture-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }
    .gesture-icon svg {
      width: 100%;
      height: 100%;
    }
    .gesture-label {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.95);
      letter-spacing: -0.1px;
    }
    .gesture-desc { display: none; }
    .gesture-item.active .gesture-label { color: rgba(255,255,255,1); }
    .gesture-item:not(.active) .gesture-label { color: rgba(255,255,255,0.95); }

    #puppy-shadow { display: none; }
    #puppy-wrapper {
      position: relative;
      z-index: 1;
    }
    #puppy-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #puppy-wrap::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 46%;
      height: 46%;
      background: rgba(55, 80, 35, 0.55);
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
    }
    #puppy-wrap::after {
      display: none;
    }

    /* ─── PUPPY ANIMATIONS ─── */

    @keyframes body-rock {
      from { transform: rotate(-8deg); }
      to   { transform: rotate(8deg); }
    }
    @keyframes tail-wag {
      from { transform: rotate(-25deg); }
      to   { transform: rotate(25deg); }
    }
    @keyframes tail-wag-fast {
      from { transform: rotate(-45deg); }
      to   { transform: rotate(45deg); }
    }
    @keyframes body-wiggle {
      from { transform: rotate(-6deg); }
      to   { transform: rotate(6deg); }
    }
    @keyframes head-bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }
    @keyframes blink {
      0%, 92% { opacity: 1; }
      93%     { opacity: 0; }
      96%     { opacity: 0; }
      97%     { opacity: 1; }
      100%    { opacity: 1; }
    }
    @keyframes label-fade {
      0%   { opacity: 0; }
      12%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── Whole dog rocks as one unit ── */
    #puppy-wrapper {
      display: inline-block;
      transform-origin: center center;
      will-change: transform;
      animation: body-rock 0.9s ease-in-out infinite alternate;
    }

    /* ── Tail: faster wag on top of body rock ── */
    #tail {
      transform-box: fill-box;
      transform-origin: 85% 90%;
      will-change: transform;
      animation: tail-wag 0.4s ease-in-out infinite alternate;
    }

    /* ── Eyes: blink on iris paths only — scaleY closes vertically ── */
    #eye-left,
    #eye-right {
      animation: blink 2.5s infinite;
    }

    /* ── WAITING ── */
    #puppy-wrap.state-waiting #puppy-wrapper {
      animation: none;
      transform: rotate(15deg);
      transition: transform 0.4s ease;
    }
    #puppy-wrap.state-waiting #tail {
      transform-box: fill-box;
      transform-origin: 85% 90%;
      will-change: transform;
      animation: tail-wag 1.5s ease-in-out infinite alternate;
    }

    /* ── SIT — relaxed attentiveness ── */
    @keyframes tail-wag-sit {
      from { transform: rotate(-15deg); }
      to   { transform: rotate(15deg); }
    }
    #puppy-wrap.state-sit #head-with-ears {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      transform: rotate(-20deg);
      transition: transform 0.4s ease;
    }
    #puppy-wrap.state-sit #puppy-wrapper {
      animation-play-state: paused;
    }
    #puppy-wrap.state-sit #tail {
      transform-box: fill-box;
      transform-origin: 85% 90%;
      animation: tail-wag-sit 1.5s ease-in-out infinite alternate;
    }

    /* ── STAY — tense focused effort ── */
    @keyframes tail-wag-stay {
      from { transform: rotate(-5deg); }
      to   { transform: rotate(5deg); }
    }
    #puppy-wrap.state-stay #puppy-wrapper {
      animation-play-state: paused;
    }
    #puppy-wrap.state-stay #ear-left {
      transform-box: fill-box;
      transform-origin: 50% 100%;
      animation: none;
      transform: rotate(10deg);
      transition: transform 0.3s ease;
    }
    #puppy-wrap.state-stay #ear-right {
      transform-box: fill-box;
      transform-origin: 50% 100%;
      animation: none;
      transform: rotate(-10deg);
      transition: transform 0.3s ease;
    }
    #puppy-wrap.state-stay #tail {
      transform-box: fill-box;
      transform-origin: 85% 90%;
      animation: tail-wag-stay 2s ease-in-out infinite alternate;
    }
    #puppy-wrap.state-stay #eye-left,
    #puppy-wrap.state-stay #eye-right {
      animation: blink 6s infinite;
    }

    /* ── GOOD BOY ── */
    #puppy-wrap.state-goodboy #puppy-wrapper {
      will-change: transform;
      animation: body-wiggle 0.2s ease-in-out infinite alternate;
    }
    #puppy-wrap.state-goodboy #tail {
      transform-box: fill-box;
      transform-origin: 85% 90%;
      will-change: transform;
      animation: tail-wag-fast 0.25s ease-in-out infinite alternate;
    }
    #puppy-wrap.state-goodboy #head-group {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      will-change: transform;
      animation: head-bounce 0.25s ease-in-out infinite alternate;
    }

    /* ─── COMMAND LABEL ─── */
    #cmd-label {
      position: fixed;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 50, 20, 0.55);
      backdrop-filter: blur(40px) saturate(140%);
      -webkit-backdrop-filter: blur(40px) saturate(140%);
      border-radius: 999px;
      padding: 12px 28px;
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 4px 16px rgba(0,0,0,0.2);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 30;
      pointer-events: none;
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', sans-serif;
    }
    #cmd-label.show {
      opacity: 1;
    }

    /* ─── CAMERA PiP ─── */
    #proc-canvas {
      position: fixed;
      top: -9999px; left: -9999px;
      width: 1px; height: 1px;
    }
    #camera-pip {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: none;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      z-index: 20;
    }
    #camera-pip.visible { display: flex; }
    #camera-pip-label {
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', sans-serif;
      font-size: 16px;
      color: rgba(255,255,255,0.95);
      margin-bottom: 0;
      font-weight: 600;
      padding-left: 2px;
    }
    #camera-feed-wrapper {
      background: rgba(30, 50, 20, 0.45);
      backdrop-filter: blur(40px) saturate(140%);
      -webkit-backdrop-filter: blur(40px) saturate(140%);
      border-radius: 16px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        0 8px 32px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #webcam {
      width: 140px;
      height: 105px;
      border-radius: 10px;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
      background: #000;
    }

    /* ─── STATUS ─── */
    #status-msg {
      position: fixed;
      bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--text-dark);
      color: #fff;
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #status-msg.show { opacity: 1; }

    /* ─── Z-INDEX STACK ─── */
    #small-screen-overlay { z-index: 100; }
    #cmd-label        { z-index: 30; }
    #legend           { z-index: 20; }
    #camera-pip       { z-index: 20; }
    #puppy-wrap       { z-index: 10; }

    #main-screen { position: relative; z-index: 1; }

    /* ─── SMALL SCREEN OVERLAY ─── */
    #small-screen-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #small-screen-overlay.visible { display: flex; }
    .small-screen-card {
      background: rgba(30, 50, 20, 0.55);
      backdrop-filter: blur(40px) saturate(140%);
      -webkit-backdrop-filter: blur(40px) saturate(140%);
      border-radius: 24px;
      padding: 32px 36px 28px;
      width: calc(100vw - 48px);
      max-width: 420px;
      padding: 32px 24px 28px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        0 20px 60px rgba(0,0,0,0.2);
    }
    .small-screen-icon {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .small-screen-card h2 {
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', sans-serif;
      font-size: 19px;
      font-weight: 700;
      color: white;
      margin: 0;
    }
    .small-screen-card p {
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.82);
      line-height: 1.5;
      margin: 0;
      max-width: 340px;
    }

    @media (max-width: 960px) {
      #small-screen-overlay { display: flex; }
      #camera-pip { display: none !important; }
    }
  </style>
</head>
<body>

</div>

<!-- Camera PiP -->
<div id="camera-pip">
  <div id="camera-feed-wrapper">
    <span id="camera-pip-label">Your camera</span>
    <video id="webcam" autoplay muted playsinline></video>
  </div>
</div>
<canvas id="proc-canvas"></canvas>
<div id="status-msg"></div>

<script type="module">
  import { GestureRecognizer, FilesetResolver } from
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

  // ─── DOM refs ───
  const mainScreen    = document.getElementById('main-screen');
  const video         = document.getElementById('webcam');
  const puppyWrap     = document.getElementById('puppy-wrap');
  const cmdLabel      = document.getElementById('cmd-label');
  const statusMsg     = document.getElementById('status-msg');
  const rows = {
    stay:    document.getElementById('row-stay'),
    sit:     document.getElementById('row-sit'),
    goodboy: document.getElementById('row-goodboy'),
  };

  // ─── State ───
  let gestureRecognizer = null;
  let currentState     = 'idle';
  let currentCandidate = null;
  let holdStart        = 0;
  let activeGesture    = null;
  let returnTimer      = null;
  let labelTimer       = null;
  let lastVideoTime    = -1;

  const GESTURE_MAP = {
    'Open_Palm':   'stay',
    'Pointing_Up': 'sit',
    'Thumb_Up':    'goodboy',
  };
  const HOLD_MS   = 400;
  const HOLD_MS_POINTING_UP = 250;
  const RETURN_MS = 3000;
  const LABEL_MS  = 1800;

  const COMMAND_LABELS = {
    stay:    'Stay',
    sit:     'Sit',
    goodboy: 'Good boy!',
  };
  const COMMAND_COLORS = {
    stay:    '#BE4737',
    sit:     '#C49A1A',
    goodboy: '#3D85A8',
  };

  // ─── Auto-start ───
  let cameraStarted = false;

  async function startCamera() {
    if (cameraStarted) return;
    cameraStarted = true;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      await video.play();
      document.getElementById('camera-pip').classList.add('visible');
      mainScreen.classList.add('visible');
      try {
        await initMediaPipe();
      } catch (mpErr) {
        showStatus('Could not load gesture model. Please refresh.');
        return;
      }
      startLoop();
    } catch (err) {
      showStatus('Camera access denied. Please allow camera and refresh.');
    }
  }

  // Only start camera if screen is wide enough
  if (window.innerWidth >= 960) {
    startCamera();
  }

  // If user resizes to desktop, start camera then
  window.addEventListener('resize', () => {
    if (window.innerWidth >= 960 && !cameraStarted) {
      startCamera();
    }
  });

  // ─── MediaPipe init ───
  async function initMediaPipe() {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
    );
    gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
        delegate: "GPU",
      },
      runningMode: "VIDEO",
      numHands: 2,
      minHandDetectionConfidence: 0.4,
      minHandPresenceConfidence: 0.4,
      minTrackingConfidence: 0.4,
    });
  }

  // ─── Detection loop ───
  function startLoop() {
    function loop() {
      requestAnimationFrame(loop);
      if (!gestureRecognizer) return;
      if (video.readyState < 2) return;
      const now = performance.now();
      if (video.currentTime === lastVideoTime) return;
      lastVideoTime = video.currentTime;
      processResults(gestureRecognizer.recognizeForVideo(video, now), now);
    }
    loop();
  }

  function processResults(results, now) {
    const hasHand = results.landmarks && results.landmarks.length > 0;
    let detected = null;

    if (hasHand && results.gestures && results.gestures.length > 0) {
      // Pick the best gesture across all detected hands
      let bestGesture = null;
      let bestScore = 0;
      for (const handGestures of results.gestures) {
        const top = handGestures[0];
        const minScore = top.categoryName === 'Pointing_Up' ? 0.40 : 0.50;
        if (top.score > minScore && top.score > bestScore && GESTURE_MAP[top.categoryName]) {
          bestScore = top.score;
          bestGesture = GESTURE_MAP[top.categoryName];
        }
      }
      detected = bestGesture;
    }

    // Gesture is active — decide whether to hold, countdown, or unlock
    if (activeGesture !== null) {
      if (detected === activeGesture) {
        // Same gesture still held — stay locked, cancel any pending return
        clearTimeout(returnTimer);
        returnTimer = null;
        return;
      }
      if (detected !== null) {
        // Different gesture detected while one is active — switch instantly, no idle flash
        clearTimeout(returnTimer);
        returnTimer = null;
        activeGesture = null;
        triggerGesture(detected);
        return;
      } else {
        // Gesture released — short delay before returning to idle
        if (!returnTimer) {
          hideLabel();
          returnTimer = setTimeout(() => {
            activeGesture = null;
            returnTimer = null;
            clearHighlights();
            setState('idle');
          }, 200);
        }
        return;
      }
    }

    // Hold timer logic — first time detecting a gesture
    if (detected !== currentCandidate) {
      currentCandidate = detected;
      holdStart = now;
    } else if (detected && (now - holdStart >= (currentCandidate === 'sit' ? HOLD_MS_POINTING_UP : HOLD_MS))) {
      triggerGesture(detected);
      return;
    }

    // Update visual state
    if (!hasHand)       setState('idle');
    else if (!detected) setState('waiting');
    else                setState('waiting');
  }

  function triggerGesture(gesture) {
    activeGesture = gesture;
    currentCandidate = null;
    setState(gesture);
    highlightRow(gesture);
    showLabel(COMMAND_LABELS[gesture]);

    clearTimeout(returnTimer);
    returnTimer = null;
  }

  // ─── State management ───
  const puppyWrapper = document.getElementById('puppy-wrapper');

  function setState(state) {
    if (currentState === state) return;
    currentState = state;
    puppyWrap.className = '';
    if (state !== 'idle') puppyWrap.classList.add('state-' + state);

    puppyWrapper.style.animation = '';
  }

  function highlightRow(gesture) {
    clearHighlights();
    if (rows[gesture]) rows[gesture].classList.add('active');
  }

  function clearHighlights() {
    Object.values(rows).forEach(r => r.classList.remove('active'));
  }

  // ─── Command label ───
  function showLabel(text) {
    clearTimeout(labelTimer);
    cmdLabel.textContent = text;
    cmdLabel.classList.add('show');
  }

  function hideLabel() {
    clearTimeout(labelTimer);
    labelTimer = setTimeout(() => cmdLabel.classList.remove('show'), 300);
  }

  // ─── Status message ───
  function showStatus(msg) {
    statusMsg.textContent = msg;
    statusMsg.classList.add('show');
    setTimeout(() => statusMsg.classList.remove('show'), 4000);
  }
</script>
